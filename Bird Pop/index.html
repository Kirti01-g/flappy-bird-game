<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bird Pop</title>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="cloud c4"></div>
    <div class="bg-pipe p1"></div>
    <div class="bg-pipe p2"></div>
    <div class="bg-pipe p3"></div>
  </div>

  <main class="app">
    <section class="game-shell">
      <header class="topbar">
        <div class="scoreboard">
          <div class="badge">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="badge">
            <span>High Score</span>
            <strong id="highScore">0</strong>
          </div>
        </div>
        <button class="action-btn" id="actionBtn" type="button">Start Game</button>
      </header>

      <div class="game-stage" id="gameStage">
        <canvas id="gameCanvas" aria-label="Flappy Bird style game"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-card">
            <h1 id="overlayTitle">Flappy Pop</h1>
            <p id="overlayText">Tap, click, or press space to flap through the pipes.</p>
            <p class="meta" id="overlayMeta">Beat your high score!</p>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
